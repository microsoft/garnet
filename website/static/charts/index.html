<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Benchmarks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.2/dist/Chart.min.js"></script>
</head>

<body>
    <header class="d-flex flex-wrap justify-content-between py-3 mb-4 px-3 border-bottom">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none">
            <img src="https://microsoft.github.io/garnet/img/garnet-logo-diamond.png" class="me-2"
                style="width: 40px; height: 40px;" alt="Garnet Logo">
            <span class="fs-4">Garnet Benchmarks</span>
        </a>

        <div class="text-end">
            <button type="button" class="btn btn-outline-secondary me-2" id="dl-button"><i
                    class="bi bi-file-earmark-arrow-down"></i>
                Download JSON Data</button>
            <a class="btn btn-secondary" id="repository-link" href="#" target="_blank" role="button"><i
                    class="bi bi-github"></i> GitHub</a>
        </div>
    </header>

    <main class="container w-50">
        <!-- Selectors -->
        <div class="container">
            <div class="vstack gap-2 mb-4">
                <select class="form-select" id="benchmark-selector">
                    <option selected>Select benchmark set</option>
                </select>
                <select class="form-select" id="chart-selector" disabled>
                    <option selected>Select chart</option>
                </select>
            </div>
        </div>

        <!-- Charts -->
        <div class="container" id="charts-container"></div>
        <br><br><br><br><br>
    </main>

    <footer class="footer d-flex p-3 flex-wrap justify-content-between align-items-center border-top fixed-bottom"
        style="background-color: white;">
        <div>
            <small class="text-body-secondary">Last update:</small>
            <span class="badge text-bg-secondary" id="last-update"></span>
        </div>
        <small class="text-body-secondary">Powered by <a rel="noopener" target="_blank"
                href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a></small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script src="data.js"></script>
    <script id="main-script">
        'use strict';
        (function () {
            // Colors from https://github.com/github/linguist/blob/master/lib/linguist/languages.yml
            const toolColors = {
                cargo: '#dea584',
                go: '#00add8',
                benchmarkjs: '#f1e05a',
                benchmarkluau: '#000080',
                pytest: '#3572a5',
                googlecpp: '#f34b7d',
                catch2: '#f34b7d',
                julia: '#a270ba',
                jmh: '#b07219',
                benchmarkdotnet: '#178600',
                customBiggerIsBetter: '#38ff38',
                customSmallerIsBetter: '#ff3838',
                _: '#333333'
            };

            function init() {
                function collectBenchesPerTestCase(entries) {
                    const map = new Map();
                    for (const entry of entries) {
                        const { commit, date, tool, benches } = entry;
                        for (const bench of benches) {
                            const result = { commit, date, tool, bench };
                            const arr = map.get(bench.name);
                            if (arr === undefined) {
                                map.set(bench.name, [result]);
                            } else {
                                arr.push(result);
                            }
                        }
                    }
                    return map;
                }

                const data = window.BENCHMARK_DATA;

                // Render header
                document.getElementById('last-update').textContent = new Date(data.lastUpdate).toString();
                const repoLink = document.getElementById('repository-link');
                repoLink.href = data.repoUrl;

                // Render footer
                document.getElementById('dl-button').onclick = () => {
                    const dataStr = JSON.stringify(data, null, 2);
                    const blob = new Blob([dataStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);

                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "benchmark_data.json";
                    document.body.appendChild(a);
                    a.click();

                    // Clean up
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                };

                // Prepare data points for charts
                delete data.entries.Benchmark;
                return Object.keys(data.entries).map(name => ({
                    name,
                    dataSet: collectBenchesPerTestCase(data.entries[name]),
                }));
            }

            function renderAllCharts(dataSets, selectedSet) {

                function renderGraph(parent, name, dataset) {
                    const canvas = document.createElement('canvas');
                    canvas.className = 'benchmark-chart';
                    canvas.setAttribute('data-graph-name', name);
                    parent.appendChild(canvas);

                    const color = toolColors[dataset.length > 0 ? dataset[0].tool : '_'];
                    const data = {
                        labels: dataset.map(d => d.commit.id.slice(0, 7)),
                        datasets: [
                            {
                                label: name,
                                data: dataset.map(d => d.bench.value),
                                borderColor: color,
                                backgroundColor: color + '60', // Add alpha for #rrggbbaa
                            }
                        ],
                    };
                    const options = {
                        scales: {
                            xAxes: [
                                {
                                    scaleLabel: {
                                        display: true,
                                        labelString: 'commit',
                                    },
                                }
                            ],
                            yAxes: [
                                {
                                    scaleLabel: {
                                        display: true,
                                        labelString: dataset.length > 0 ? dataset[0].bench.unit : '',
                                    },
                                    ticks: {
                                        beginAtZero: true,
                                    }
                                }
                            ],
                        },
                        tooltips: {
                            callbacks: {
                                afterTitle: items => {
                                    const { index } = items[0];
                                    const data = dataset[index];
                                    return '\n' + data.commit.message + '\n\n' + data.commit.timestamp + ' committed by @' + data.commit.committer.username + '\n';
                                },
                                label: item => {
                                    let label = item.value;
                                    const { range, unit } = dataset[item.index].bench;
                                    label += ' ' + unit;
                                    if (range) {
                                        label += ' (' + range + ')';
                                    }
                                    return label;
                                },
                                afterLabel: item => {
                                    const { extra } = dataset[item.index].bench;
                                    return extra ? '\n' + extra : '';
                                }
                            }
                        },
                        onClick: (_mouseEvent, activeElems) => {
                            if (activeElems.length === 0) {
                                return;
                            }
                            // XXX: Undocumented. How can we know the index?
                            const index = activeElems[0]._index;
                            const url = dataset[index].commit.url;
                            window.open(url, '_blank');
                        },
                    };

                    new Chart(canvas, {
                        type: 'line',
                        data,
                        options,
                    });
                }

                function renderBenchSet(name, benchSet, main) {
                    const setElem = document.createElement('div');
                    setElem.className = 'benchmark-set';
                    main.appendChild(setElem);

                    const nameElem = document.createElement('h4');
                    nameElem.className = 'benchmark-title';
                    nameElem.textContent = name;
                    setElem.appendChild(nameElem);

                    const graphsElem = document.createElement('div');
                    graphsElem.className = 'benchmark-graphs';
                    setElem.appendChild(graphsElem);

                    for (const [benchName, benches] of benchSet.entries()) {
                        renderGraph(graphsElem, benchName, benches)
                    }
                }


                const main = document.getElementById('charts-container');
                main.innerHTML = '';

                if (selectedSet == null) {
                    return;
                }

                for (const { name, dataSet } of dataSets) {
                    if (selectedSet && name !== selectedSet)
                        continue;

                    renderBenchSet(name, dataSet, main);
                }
            }

            function populateBenchmarkSelector(dataSets) {
                const selector = document.getElementById('benchmark-selector');
                selector.innerHTML = '<option selected>Select benchmark set</option>';
                dataSets.forEach(({ name }) => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    selector.appendChild(option);
                });
            }

            function populateChartSelector(dataSets, selectedSet) {
                const selector = document.getElementById('chart-selector');
                selector.innerHTML = '<option selected>Select chart</option>';
                if (selectedSet) {
                    const selectedDataSet = dataSets.find(ds => ds.name === selectedSet);
                    if (selectedDataSet) {
                        for (const benchName of selectedDataSet.dataSet.keys()) {
                            const option = document.createElement('option');
                            option.value = benchName;
                            option.textContent = benchName;
                            selector.appendChild(option);
                        }
                        selector.disabled = false;
                    }
                } else {
                    selector.disabled = true;
                }
            }

            const dataSets = init();
            populateBenchmarkSelector(dataSets);
            // renderAllCharts(dataSets, null); // Use this to render all charts on load

            document.getElementById('benchmark-selector').addEventListener('change', function () {
                const value = this.value !== 'Select benchmark set' ? this.value : null;
                console.log('Selected:', value);
                renderAllCharts(dataSets, value);
                populateChartSelector(dataSets, value);
            });

            document.getElementById('chart-selector').addEventListener('change', function () {
                const selectedChart = this.value;
                if (selectedChart && selectedChart !== 'Select chart') {
                    const targetElement = document.querySelector(`[data-graph-name="${selectedChart}"]`);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        })();
    </script>
</body>

</html>
