# Baseline Redis config for the Garnet Streams benchmark — fairness parity with Garnet.
#
# This file sets the COMMON baseline only. Per-scenario persistence flags (see §8 of the
# suite README) are applied by scripts/run-suite.sh on the redis-server command line so
# the same base config serves both the `memory` and `aof` scenarios.
#
# Pin the Redis version when publishing (e.g. redis-server 7.4.x) and record it via
# scripts/env-capture.sh.

# --- Networking ---
bind 127.0.0.1
port 6380                 # non-default so it never collides with a stray local Redis
protected-mode no         # benchmark host only; never expose this config publicly
tcp-backlog 4096
tcp-keepalive 60
timeout 0

# --- Disable eviction / memory caps so neither engine drops data mid-run ---
maxmemory 0
maxmemory-policy noeviction

# --- Persistence baseline: OFF here; run-suite.sh enables AOF for the `aof` scenario ---
# memory scenario  -> redis-server uses these (RDB snapshotting disabled, AOF off)
# aof    scenario  -> run-suite.sh overrides: --appendonly yes --appendfsync everysec
save ""
appendonly no

# --- Logging / misc (keep noise low, behavior deterministic) ---
loglevel notice
databases 1
latency-tracking no       # we measure latency client-side (memtier / HdrHistogram)

# --- Threading note ---
# Redis executes commands on a single thread. io-threads only parallelizes socket I/O.
# For the "resource-matched" framing (README §2) prefer N independent redis-server
# instances (cluster or client-side sharding) over io-threads, and disclose which framing
# was used. Left at default (off) for the single-instance framing:
# io-threads 1
