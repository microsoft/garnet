name: Garnet Nightly Tests
on:
  schedule:
    - cron:  '0 9 * * *' # Runs at 09:00 UTC, which is 1:00 AM PST
  workflow_dispatch:
    inputs:
      max-parallel:
        description: 'Maximum parallel test jobs'
        type: choice
        options: ['4', '8', '16', '0']
        default: '8'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

permissions:
  contents: write  
  
jobs:
  build-test-all:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: ${{ github.event.inputs.max-parallel == '0' && 256 || github.event.inputs.max-parallel || 8 }}
      matrix:
        test: [ 'Garnet.test', 'Garnet.test.collections', 'Garnet.test.acl', 'Garnet.test.scripting', 'Garnet.test.complexstring', 'Garnet.test.vectorset', 'Garnet.test.rangeindex', 'Garnet.test.extensions', 'Garnet.test.cluster', 'Garnet.test.cluster.migrate', 'Garnet.test.cluster.replication', 'Garnet.test.cluster.replication.tls', 'Garnet.test.cluster.replication.asyncreplay', 'Garnet.test.cluster.replication.disklesssync', 'Garnet.test.cluster.vectorsets', 'Garnet.test.cluster.multilog', 'Tsavorite.test', 'Tsavorite.test.recordops', 'Tsavorite.test.session', 'Tsavorite.test.session.context', 'Tsavorite.test.hlog', 'Tsavorite.test.recovery' ]
        os: [ ubuntu-latest, windows-latest ]
        framework: [ 'net8.0', 'net10.0' ]
        configuration: [ 'Debug', 'Release' ]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set environment variable for Linux
        run: echo "RunAzureTests=yes" >> $GITHUB_ENV
        if: ${{ matrix.os == 'ubuntu-latest' }}

      - name: Set environment variable for Windows
        run: echo ("RunAzureTests=yes") >> $env:GITHUB_ENV
        if: ${{ matrix.os == 'windows-latest' }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Setup Node.js for Azurite
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Azurite
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '%APPDATA%\npm-cache' || '~/.npm' }}
          key: azurite-${{ runner.os }}

      - name: Install and Run Azurite
        shell: bash
        run: |
          npm install -g azurite
          azurite &
          
      - name: Install dependencies
        run: dotnet restore

      - name: Check style format
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Build Tsavorite
        if: ${{ startsWith(matrix.test, 'Tsavorite.') }}
        run: dotnet build libs/storage/Tsavorite/cs/Tsavorite.slnx --configuration ${{ matrix.configuration }}

      - name: Build Garnet
        if: ${{ !startsWith(matrix.test, 'Tsavorite.') }}
        run: dotnet build --configuration ${{ matrix.configuration }}

      - name: Run tests ${{ matrix.test }}
        shell: pwsh
        run: |
          $resultsDir = "${{ matrix.test }}-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}"
          $tsavoriteDirMap = @{
            "Tsavorite.test" = "test"
            "Tsavorite.test.recordops" = "test/test.recordops"
            "Tsavorite.test.session" = "test/test.session"
            "Tsavorite.test.session.context" = "test/test.session.context"
            "Tsavorite.test.hlog" = "test/test.hlog"
            "Tsavorite.test.recovery" = "test/test.recovery"
          }
          if ($tsavoriteDirMap.ContainsKey("${{ matrix.test }}")) {
            $dir = $tsavoriteDirMap["${{ matrix.test }}"]
            dotnet test "libs/storage/Tsavorite/cs/$dir/${{ matrix.test }}.csproj" `
              -f "${{ matrix.framework }}" `
              --configuration "${{ matrix.configuration }}" `
              --logger "console;verbosity=detailed" `
              --logger "trx" `
              --results-directory "$resultsDir"
          } else {
            $subdir = if ("${{ matrix.test }}".StartsWith("Garnet.test.cluster")) { "cluster" } else { "standalone" }
            dotnet test "test/$subdir/${{ matrix.test }}" `
              -f "${{ matrix.framework }}" `
              --configuration "${{ matrix.configuration }}" `
              --logger "console;verbosity=detailed" `
              --logger "trx" `
              --results-directory "$resultsDir"
          }
        timeout-minutes: 55        

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.test }}-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}
          path: ${{ matrix.test }}-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}
        if: ${{ always() }}
