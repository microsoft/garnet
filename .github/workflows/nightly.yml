#      - name: Generate Unified Allure Report
#        run: |
#          allure generate final-results/allure-results --clean -o final-report

      - name: Upload Unified Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: unified-allure-report
          path: final-report
