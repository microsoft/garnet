  merge-results-and-generate-report:
    name: Merge Results & Generate Unified Allure Report
    runs-on: windows-2022
    needs: build-test-garnet
    if: always()
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download all test result artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged-results

      - name: Flatten .trx files into one directory
        run: |
          mkdir final-results
          Get-ChildItem -Recurse -Filter *.trx -Path merged-results | ForEach-Object {
            Copy-Item $_.FullName -Destination final-results
          }
          dir final-results  
          
      - name: Copy categories.json
        run: |
          Copy-Item categories.json final-results/allure-results -Force

      - name: Install Allure and Generate the Report
        run: |
          iex "& {$(irm get.scoop.sh)}"
          scoop install allure
          scoop bucket add extras
          $env:PATH += ";$env:USERPROFILE\scoop\apps\allure\current\bin"
          allure generate final-results/allure-results --clean -o final-report



#      - name: Convert .trx to Allure format
