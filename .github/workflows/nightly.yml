  merge-results-and-generate-report:
    name: Merge Results & Generate Unified Allure Report
    runs-on: windows-2022
    needs: build-test-garnet
    if: always()
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download all test result artifacts
        uses: actions/download-artifact@v4
        with:
          path: merged-results

      - name: Collect .trx files into one directory
        if: always()
        run: |
          mkdir final-results
          Get-ChildItem -Recurse -Filter *.trx -Path merged-results | ForEach-Object {
            Copy-Item $_.FullName -Destination final-results
          }
          dir final-results  
          
      - name: Copy categories.json
        if: always()
        run: |
          Copy-Item categories.json final-results -Force

      # DEBUG - a test to see if history already being checked in can be copied to the final results 
      # DEBUG - for now the saved history folder is in root ... maybe move it all to a different folder if going to go with this   
      - name: Copy checked-in history folder to final-results
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $source = "history"
          $target = "final-results/history"
          dir $source

          Write-Host "Copying checked-in history from $source to $target"

          if (Test-Path $source) {
              New-Item -ItemType Directory -Force -Path $target
              Copy-Item "$source/*" -Destination $target -Recurse -Force
              Write-Host "History copied successfully"
              dir $target -Recurse
          } else {
              Write-Host "No history folder found in repo"
          }

      # TO DO: GitHub Actions doesn't support referring back to previous history - so need to check it in or something
      # TO DO: Problem is that there are thousands of test cases
#      - name: Download previous history from artifacts
#        if: always()
#        continue-on-error: true
#        uses: actions/download-artifact@v4
#        with:
#          name: allure-history
#          path: previous-history

#      - name: Restore history
#        if: always()
#        shell: pwsh
#        run: |
#          $source = "previous-history"
#          $target = "final-results/history"

#          Write-Host "Contents of previous-history before restore:"
#          dir $source -Recurse
          
#          New-Item -ItemType Directory -Force -Path $target

#          if (Test-Path "$source") {
#              Copy-Item "$source/*" -Destination $target -Recurse -Force
#          } else {
#              Write-Host "No previous history found"
#          }
#          Write-Host "Contents of final-results/history after restore:"
#          dir $target -Recurse

      - name: Install Allure and Generate the Report
        if: always()
        run: |
          iex "& {$(irm get.scoop.sh)}"
          scoop install allure
          scoop bucket add extras
          $env:PATH += ";$env:USERPROFILE\scoop\apps\allure\current\bin"
          allure -v generate final-results --clean -o final-report --single-file
          dir final-report -Recurse

      - name: Upload Unified Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unified-allure-report
          path: final-report

