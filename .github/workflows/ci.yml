name: Garnet .NET CI
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

permissions:
  contents: read

jobs:
  changes:
    name: Check for changes
    runs-on: ubuntu-latest # don't need matrix to test where the changes were made in code
    permissions:
      pull-requests: read
      contents: read
    outputs:
      tsavorite: ${{ steps.filter.outputs.tsavorite }}
      website: ${{ steps.filter.outputs.website }}
      garnet: ${{ steps.filter.outputs.garnet }}
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Apply filter
      uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36   #v3  for security reasons have pinned tag (commit SHA) for 3rd party
      id: filter
      with:
        filters: |
          tsavorite:
            - 'libs/storage/Tsavorite/**'
          website:
            - 'website/**'
          garnet:
            - '!((*.md)|(website/**))'
  
  format-garnet:
    name: Format Garnet
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.garnet == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Install dependencies
        run: dotnet restore Garnet.slnx
      - name: Check style format
        run: dotnet format Garnet.slnx --no-restore --verify-no-changes --verbosity diagnostic

  format-tsavorite:
    name: Format Tsavorite
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.tsavorite == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Install dependencies
        run: dotnet restore libs/storage/Tsavorite/cs/Tsavorite.slnx
      - name: Check style format
        run: dotnet format libs/storage/Tsavorite/cs/Tsavorite.slnx --no-restore --verify-no-changes --verbosity diagnostic
  
  # Job to build Garnet code (once per os/framework/configuration)
  build-garnet:
    name: Build Garnet
    needs: [changes]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        framework: [ 'net8.0' , 'net10.0']
        configuration: [ 'Debug', 'Release' ]
    if: needs.changes.outputs.garnet == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-
      - name: Install dependencies
        run: dotnet restore
      - name: Build Garnet
        run: dotnet build --configuration ${{ matrix.configuration }} --no-restore -graph
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}
          path: |
            **/bin/${{ matrix.configuration }}/
            **/obj/
          retention-days: 1

  # Job to test Garnet code (downloads build artifacts, no rebuild)
  test-garnet:
    name: Garnet
    needs: [changes, build-garnet]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        framework: [ 'net8.0' , 'net10.0']
        configuration: [ 'Debug', 'Release' ]
        test: [ 'Garnet.test', 'Garnet.test.collections', 'Garnet.test.acl', 'Garnet.test.scripting', 'Garnet.test.complexstring', 'Garnet.test.vectorset', 'Garnet.test.rangeindex', 'Garnet.test.extensions', 'Garnet.test.cluster', 'Garnet.test.cluster.migrate', 'Garnet.test.cluster.replication', 'Garnet.test.cluster.replication.tls', 'Garnet.test.cluster.replication.asyncreplay', 'Garnet.test.cluster.replication.disklesssync', 'Garnet.test.cluster.vectorsets', 'Garnet.test.cluster.multilog' ]
    if: needs.changes.outputs.garnet == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}
      - name: Restore execute permissions
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: find . -name 'GarnetServer' -type f -exec chmod +x {} +

      - name: Resolve test directory
        shell: pwsh
        run: |
          if ("${{ matrix.test }}".StartsWith("Garnet.test.cluster")) {
            $subdir = "cluster"
          } else {
            $subdir = "standalone"
          }
          echo "TEST_DIR=test/$subdir/${{ matrix.test }}" >> $env:GITHUB_ENV
  
      - name: Verify Allure wiring (${{ matrix.test }})
        shell: pwsh
        run: |
          $asmPath = "${{ github.workspace }}/${{ env.TEST_DIR }}/bin/${{ matrix.configuration }}/${{ matrix.framework }}/${{ matrix.test }}.dll"
          $asm = [System.Reflection.Assembly]::LoadFrom($asmPath)

          # When using .Net 9.0/10.0 it tries to resolve every referenced type in that assembly and some dependencies are missing by design so pops exception.
          # Since we don't want to fail on every 9.0/10.0 run (even when has Allure inheritance), we catch it here.  
          try {
              $types = $asm.GetTypes()
          } catch [System.Reflection.ReflectionTypeLoadException] {
              $types = $_.Exception.Types | Where-Object { $_ -ne $null }
          }
          $allureBase = $types | Where-Object { $_.Name -eq "AllureTestBase" }
          if (-not $allureBase) {
            # AllureTestBase may be in a transitive dependency already loaded by the runtime during GetTypes().
            # Search all loaded assemblies in the AppDomain rather than only direct references.
            foreach ($loaded in [System.AppDomain]::CurrentDomain.GetAssemblies()) {
              try {
                try { $refTypes = $loaded.GetTypes() } catch [System.Reflection.ReflectionTypeLoadException] { $refTypes = $_.Exception.Types | Where-Object { $_ -ne $null } }
                $allureBase = $refTypes | Where-Object { $_.Name -eq "AllureTestBase" }
                if ($allureBase) { break }
              } catch { }
            }
          }

          $bad = @()
          foreach ($t in $types) {
              # Detect NUnit test fixtures by attribute names
              $isFixture = $t.GetCustomAttributes($true) |
                          Where-Object { $_.GetType().FullName -eq "NUnit.Framework.TestFixtureAttribute" } |
                          Measure-Object | Select-Object -ExpandProperty Count
              if ($isFixture -eq 0) {
                  $isFixture = $t.GetMethods() |
                              ForEach-Object { $_.GetCustomAttributes($true) } |
                              Where-Object { $_.GetType().FullName -eq "NUnit.Framework.TestAttribute" } |
                              Measure-Object | Select-Object -ExpandProperty Count
              }

              if ($isFixture -gt 0) {
                  $inheritsAllure = $allureBase -and $allureBase.IsAssignableFrom($t)
                  $hasAttr = $t.GetCustomAttributes($true) |
                            Where-Object { $_.GetType().FullName -eq "Allure.NUnit.AllureNUnitAttribute" } |
                            Measure-Object | Select-Object -ExpandProperty Count

                  if (-not $inheritsAllure -or $hasAttr -eq 0) {
                      $bad += $t.FullName
                  }
              }
          }

          if ($bad.Count -gt 0) {
            Write-Host "These test fixtures are missing Allure setup from $asmPath. See Pull Request Protocol for details on how to set up Allure for new tests. https://microsoft.github.io/garnet/docs/dev/onboarding"
            $bad | ForEach-Object { Write-Host $_ }
            exit 1
          } else {
            Write-Host "All test fixtures wired to Allure in $asmPath"
          }
            
      - name: Run tests ${{ matrix.test }}
        run: dotnet test ${{ env.TEST_DIR }}/bin/${{ matrix.configuration }}/${{ matrix.framework }}/${{ matrix.test }}.dll --logger "console;verbosity=detailed" --logger trx --results-directory "GarnetTestResults-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}-${{ matrix.test }}" -- NUnit.DisplayName=FullName
        timeout-minutes: 45 
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-garnet-results-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}-${{ matrix.test }}
          path: GarnetTestResults-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}-${{ matrix.test }}
        if: ${{ always() }}

  # Job to build Tsavorite code (once per os/configuration)
  build-tsavorite:
    name: Build Tsavorite
    needs: [changes]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        configuration: [ 'Debug', 'Release' ]
    if: needs.changes.outputs.tsavorite == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-tsavorite-${{ runner.os }}-${{ hashFiles('libs/storage/Tsavorite/**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: nuget-tsavorite-${{ runner.os }}-
      - name: Install dependencies
        run: dotnet restore libs/storage/Tsavorite/cs/Tsavorite.slnx
      - name: Build Tsavorite
        run: dotnet build libs/storage/Tsavorite/cs/Tsavorite.slnx --configuration ${{ matrix.configuration }} --no-restore -graph
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tsavorite-build-${{ matrix.os }}-${{ matrix.configuration }}
          path: |
            libs/storage/Tsavorite/cs/**/bin/${{ matrix.configuration }}/
            libs/storage/Tsavorite/cs/**/obj/
          retention-days: 1

  # Job to test Tsavorite code (downloads build artifacts, no rebuild)
  test-tsavorite:
    name: Tsavorite
    needs: [changes, build-tsavorite]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        framework: [ 'net8.0', 'net10.0' ]
        configuration: [ 'Debug', 'Release' ]
        test: [ 'Tsavorite.test', 'Tsavorite.test.recordops', 'Tsavorite.test.session', 'Tsavorite.test.session.context', 'Tsavorite.test.hlog', 'Tsavorite.test.recovery' ]
    if: needs.changes.outputs.tsavorite == 'true'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set environment variable for Linux
        run: echo "RunAzureTests=yes" >> $GITHUB_ENV
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.test != 'Tsavorite.test.recordops' && matrix.test != 'Tsavorite.test.session' && matrix.test != 'Tsavorite.test.session.context' && matrix.test != 'Tsavorite.test.recovery' }}
      - name: Set environment variable for Windows
        run: echo ("RunAzureTests=yes") >> $env:GITHUB_ENV
        if: ${{ matrix.os == 'windows-latest' && matrix.test != 'Tsavorite.test.recordops' && matrix.test != 'Tsavorite.test.session' && matrix.test != 'Tsavorite.test.session.context' && matrix.test != 'Tsavorite.test.recovery' }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
      - name: Setup Node.js for Azurite
        if: ${{ matrix.test != 'Tsavorite.test.recordops' && matrix.test != 'Tsavorite.test.session' && matrix.test != 'Tsavorite.test.session.context' && matrix.test != 'Tsavorite.test.recovery' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache Azurite
        if: ${{ matrix.test != 'Tsavorite.test.recordops' && matrix.test != 'Tsavorite.test.session' && matrix.test != 'Tsavorite.test.session.context' && matrix.test != 'Tsavorite.test.recovery' }}
        uses: actions/cache@v4
        with:
          path: ${{ runner.os == 'Windows' && '%APPDATA%\npm-cache' || '~/.npm' }}
          key: azurite-${{ runner.os }}
      - name: Install and Run Azurite
        if: ${{ matrix.test != 'Tsavorite.test.recordops' && matrix.test != 'Tsavorite.test.session' && matrix.test != 'Tsavorite.test.session.context' && matrix.test != 'Tsavorite.test.recovery' }}
        shell: bash
        run: |
          npm install -g azurite
          azurite --skipApiVersionCheck &
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: tsavorite-build-${{ matrix.os }}-${{ matrix.configuration }}
          path: libs/storage/Tsavorite/cs

      - name: Verify Allure wiring (${{ matrix.test }})
        shell: pwsh
        run: |
          $testDir = switch ("${{ matrix.test }}") {
            "Tsavorite.test" { "test" }
            "Tsavorite.test.recordops" { "test/test.recordops" }
            "Tsavorite.test.session" { "test/test.session" }
            "Tsavorite.test.session.context" { "test/test.session.context" }
            "Tsavorite.test.hlog" { "test/test.hlog" }
            "Tsavorite.test.recovery" { "test/test.recovery" }
          }
          $asmPath = "${{ github.workspace }}/libs/storage/Tsavorite/cs/$testDir/bin/${{ matrix.configuration }}/${{ matrix.framework }}/${{ matrix.test }}.dll"
          $asm = [System.Reflection.Assembly]::LoadFrom($asmPath)

          # When using .Net 9.0/10.0 it tries to resolve every referenced type in that assembly and some dependencies are missing by design so pops exception.
          # Since we don't want to fail on every 9.0/10.0 run (even when has Allure inheritance), we catch it here.
          try {
              $types = $asm.GetTypes()
          } catch [System.Reflection.ReflectionTypeLoadException] {
              $types = $_.Exception.Types | Where-Object { $_ -ne $null }
          }
          $allureBase = $types | Where-Object { $_.Name -eq "AllureTestBase" }
          if (-not $allureBase) {
            # AllureTestBase may be in a transitive dependency already loaded by the runtime during GetTypes().
            # Search all loaded assemblies in the AppDomain rather than only direct references.
            foreach ($loaded in [System.AppDomain]::CurrentDomain.GetAssemblies()) {
              try {
                try { $refTypes = $loaded.GetTypes() } catch [System.Reflection.ReflectionTypeLoadException] { $refTypes = $_.Exception.Types | Where-Object { $_ -ne $null } }
                $allureBase = $refTypes | Where-Object { $_.Name -eq "AllureTestBase" }
                if ($allureBase) { break }
              } catch { }
            }
          }

          $bad = @()
          foreach ($t in $types) {
              # Detect NUnit test fixtures by attribute names
              $isFixture = $t.GetCustomAttributes($true) |
                          Where-Object { $_.GetType().FullName -eq "NUnit.Framework.TestFixtureAttribute" } |
                          Measure-Object | Select-Object -ExpandProperty Count
              if ($isFixture -eq 0) {
                  $isFixture = $t.GetMethods() |
                              ForEach-Object { $_.GetCustomAttributes($true) } |
                              Where-Object { $_.GetType().FullName -eq "NUnit.Framework.TestAttribute" } |
                              Measure-Object | Select-Object -ExpandProperty Count
              }

              if ($isFixture -gt 0) {
                  $inheritsAllure = $allureBase -and $allureBase.IsAssignableFrom($t)
                  $hasAttr = $t.GetCustomAttributes($true) |
                            Where-Object { $_.GetType().FullName -eq "Allure.NUnit.AllureNUnitAttribute" } |
                            Measure-Object | Select-Object -ExpandProperty Count

                  if (-not $inheritsAllure -or $hasAttr -eq 0) {
                      $bad += $t.FullName
                  }
              }
          }

          if ($bad.Count -gt 0) {
            Write-Host "These test fixtures are missing Allure setup from $asmPath. See Pull Request Protocol for details on how to set up Allure for new tests. https://microsoft.github.io/garnet/docs/dev/onboarding"
            $bad | ForEach-Object { Write-Host $_ }
            exit 1
          } else {
            Write-Host "All test fixtures wired to Allure in $asmPath"
          }

      - name: Run tests ${{ matrix.test }}
        run: dotnet test libs/storage/Tsavorite/cs/${{ matrix.test == 'Tsavorite.test' && 'test' || matrix.test == 'Tsavorite.test.recordops' && 'test/test.recordops' || matrix.test == 'Tsavorite.test.session' && 'test/test.session' || matrix.test == 'Tsavorite.test.session.context' && 'test/test.session.context' || matrix.test == 'Tsavorite.test.hlog' && 'test/test.hlog' || 'test/test.recovery' }}/bin/${{ matrix.configuration }}/${{ matrix.framework }}/${{ matrix.test }}.dll --logger "console;verbosity=detailed" --logger trx --results-directory "TsavoriteTestResults-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}-${{ matrix.test }}"
        timeout-minutes: 45
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-tsavorite-results-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}-${{ matrix.test }}
          path: TsavoriteTestResults-${{ matrix.os }}-${{ matrix.framework }}-${{ matrix.configuration }}-${{ matrix.test }}
        if: ${{ always() }}

  build-website:
    name: Build Website
    needs: changes    
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    if: needs.changes.outputs.website == 'true'   
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ./website/yarn.lock
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build website
        run: yarn build

  pipeline-success:
    name: Garnet CI (Complete)
    runs-on: ubuntu-latest
    needs: [changes, format-garnet, format-tsavorite, test-garnet, test-tsavorite, build-website ]
    steps:
    - run: echo Done!
    if: ${{ !(failure() || cancelled()) }}
